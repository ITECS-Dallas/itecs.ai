<svg width="1600" height="1000" viewBox="0 0 1600 1000" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="1000" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B1A28"/>
      <stop offset="0.55" stop-color="#0A1622"/>
      <stop offset="1" stop-color="#08121C"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.78" cy="0.18" r="0.6">
      <stop offset="0" stop-color="#3288B6" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#3288B6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.1" cy="0.92" r="0.55">
      <stop offset="0" stop-color="#1E5A7E" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#1E5A7E" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="shieldStroke" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#46C7E8"/>
      <stop offset="1" stop-color="#2C7AA6"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#23425A" stroke-opacity="0.18" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1600" height="1000" fill="url(#bg)"/>
  <rect width="1600" height="1000" fill="url(#grid)"/>
  <rect width="1600" height="1000" fill="url(#glow)"/>
  <rect width="1600" height="1000" fill="url(#glow2)"/>

  <!-- accent crease lines -->
  <path d="M0 250 L1600 120" stroke="#3288B6" stroke-opacity="0.10" stroke-width="2"/>
  <path d="M0 880 L1600 760" stroke="#3288B6" stroke-opacity="0.08" stroke-width="2"/>

  <!-- left content -->
  <g transform="translate(120,150)">
    <!-- ITECS wordmark -->
    <text x="0" y="0" font-family="Space Grotesk, Arial, sans-serif" font-size="34" font-weight="600" letter-spacing="6" fill="#E6EEF5">ITECS</text>
    <text x="118" y="0" font-family="IBM Plex Mono, monospace" font-size="18" letter-spacing="2" fill="#6F8597">· Dallas MSP since 2002</text>

    <!-- eyebrow -->
    <g transform="translate(0,70)">
      <rect x="0" y="0" width="13" height="13" transform="rotate(45 6.5 6.5)" fill="#46C7E8"/>
      <text x="30" y="12" font-family="IBM Plex Mono, monospace" font-size="20" letter-spacing="5" fill="#46C7E8">PRIVATE PROPOSAL</text>
    </g>

    <!-- title -->
    <text x="0" y="210" font-family="Space Grotesk, Arial, sans-serif" font-size="96" font-weight="500" letter-spacing="-3" fill="#F2F7FB">CMMC Level 2</text>
    <text x="0" y="320" font-family="Space Grotesk, Arial, sans-serif" font-size="96" font-weight="500" letter-spacing="-3" fill="#F2F7FB">Readiness<tspan fill="#46C7E8">.</tspan></text>

    <!-- subtitle -->
    <text x="4" y="400" font-family="IBM Plex Sans, Arial, sans-serif" font-size="32" fill="#9FB4C4">Prepared for <tspan fill="#E6EEF5" font-weight="600">Regulus Industries</tspan></text>

    <!-- stat chips -->
    <g transform="translate(0,470)" font-family="IBM Plex Mono, monospace">
      <g>
        <rect x="0" y="0" width="300" height="84" rx="10" fill="#0F2235" stroke="#27506C" stroke-opacity="0.7"/>
        <text x="24" y="40" font-size="40" font-weight="600" fill="#46C7E8" font-family="Space Grotesk, Arial, sans-serif">~12 wks</text>
        <text x="24" y="66" font-size="15" letter-spacing="2" fill="#7E94A6">TO ASSESSMENT-READY</text>
      </g>
      <g transform="translate(330,0)">
        <rect x="0" y="0" width="300" height="84" rx="10" fill="#0F2235" stroke="#27506C" stroke-opacity="0.7"/>
        <text x="24" y="40" font-size="40" font-weight="600" fill="#46C7E8" font-family="Space Grotesk, Arial, sans-serif">110</text>
        <text x="24" y="66" font-size="15" letter-spacing="2" fill="#7E94A6">NIST 800-171 CONTROLS</text>
      </g>
    </g>
  </g>

  <!-- right shield emblem -->
  <g transform="translate(1140,300)">
    <circle cx="160" cy="160" r="240" fill="#0E2233" stroke="#1E4660" stroke-opacity="0.5" stroke-width="2"/>
    <circle cx="160" cy="160" r="190" fill="none" stroke="#2C7AA6" stroke-opacity="0.35" stroke-width="1.5" stroke-dasharray="3 9"/>
    <!-- shield -->
    <path d="M160 36 L284 86 V190 C284 268 230 318 160 348 C90 318 36 268 36 190 V86 Z"
          fill="#0C1C2A" stroke="url(#shieldStroke)" stroke-width="5"/>
    <!-- check -->
    <path d="M104 188 L146 230 L226 132" fill="none" stroke="#46C7E8" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="160" y="408" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="19" letter-spacing="4" fill="#7E94A6">NIST SP 800-171 · CUI</text>
  </g>

  <!-- footer strip -->
  <g transform="translate(120,902)">
    <text x="0" y="0" font-family="IBM Plex Sans, Arial, sans-serif" font-size="22" fill="#7E94A6">Secureframe · Microsoft 365 GCC High · Azure Virtual Desktop · Defense Navigator</text>
  </g>
</svg>
